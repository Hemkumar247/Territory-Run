# ============================================================
# Territory Run — CI/CD Pipeline
#
# Triggers:
#   pull_request → runs lint + build (test gate)
#   push to main → deploys to STAGING Firebase project
#   release published → deploys to PRODUCTION Firebase project
#
# Required GitHub Secrets (configure in repo Settings → Secrets):
#
# Staging  (GitHub Environment: "staging"):
#   STAGING_FIREBASE_SERVICE_ACCOUNT  — JSON key for the staging project
#   STAGING_FIREBASE_PROJECT_ID
#   STAGING_FIREBASE_API_KEY
#   STAGING_FIREBASE_AUTH_DOMAIN
#   STAGING_FIREBASE_STORAGE_BUCKET
#   STAGING_FIREBASE_MESSAGING_SENDER_ID
#   STAGING_FIREBASE_APP_ID
#   STAGING_FIREBASE_DATABASE_URL
#   STAGING_SENTRY_DSN
#
# Production (GitHub Environment: "production"):
#   PROD_FIREBASE_SERVICE_ACCOUNT     — JSON key for the production project
#   PROD_FIREBASE_PROJECT_ID
#   PROD_FIREBASE_API_KEY
#   PROD_FIREBASE_AUTH_DOMAIN
#   PROD_FIREBASE_STORAGE_BUCKET
#   PROD_FIREBASE_MESSAGING_SENDER_ID
#   PROD_FIREBASE_APP_ID
#   PROD_FIREBASE_DATABASE_URL
#   PROD_SENTRY_DSN
#   SENTRY_AUTH_TOKEN                 — for uploading source maps to Sentry
#
# ⚠️  NEVER hard-code any credentials in this file.
# ============================================================

name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  release:
    types: [published]

# Cancel in-progress runs on the same branch when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # 1. Lint & Type-check (runs on every PR and push)
  # ------------------------------------------------------------------
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: TypeScript type-check (client)
        run: npm run lint

      - name: Build client (smoke-test)
        run: npm run build
        env:
          # Use placeholder values so Vite doesn't fail on missing env vars.
          # Real values are only needed for the deploy jobs.
          VITE_FIREBASE_API_KEY: placeholder
          VITE_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: placeholder
          VITE_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          VITE_FIREBASE_APP_ID: '1:000000000000:web:placeholder'
          VITE_FIREBASE_DATABASE_URL: https://placeholder.firebaseio.com
          VITE_APP_ENV: ci
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Install Functions dependencies
        run: cd functions && npm ci

      - name: TypeScript type-check (functions)
        run: cd functions && npm run lint

  # ------------------------------------------------------------------
  # 2. Deploy to STAGING (on push to main)
  # ------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    needs: lint-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Build client for staging
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.STAGING_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.STAGING_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.STAGING_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.STAGING_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.STAGING_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.STAGING_FIREBASE_APP_ID }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.STAGING_FIREBASE_DATABASE_URL }}
          VITE_SENTRY_DSN: ${{ secrets.STAGING_SENTRY_DSN }}
          VITE_APP_ENV: staging
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Deploy Hosting to Staging
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.STAGING_FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.STAGING_FIREBASE_PROJECT_ID }}
          target: staging
          channelId: live

      - name: Install Functions dependencies
        run: cd functions && npm ci

      - name: Build Functions
        run: cd functions && npm run build

      - name: Deploy Functions to Staging
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.STAGING_FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.STAGING_FIREBASE_PROJECT_ID }}
          # Deploy only functions (hosting already deployed above)
          entryPoint: './functions'

      - name: Deploy Firestore & Database Rules to Staging
        run: |
          npm install -g firebase-tools
          firebase deploy --only firestore:rules,database --project ${{ secrets.STAGING_FIREBASE_PROJECT_ID }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.STAGING_FIREBASE_SERVICE_ACCOUNT }}

  # ------------------------------------------------------------------
  # 3. Deploy to PRODUCTION (on published release tag)
  # ------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    needs: lint-and-build
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Extract release version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build client for production
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.PROD_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.PROD_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.PROD_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.PROD_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.PROD_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.PROD_FIREBASE_APP_ID }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.PROD_FIREBASE_DATABASE_URL }}
          VITE_SENTRY_DSN: ${{ secrets.PROD_SENTRY_DSN }}
          VITE_APP_ENV: production
          VITE_APP_VERSION: ${{ steps.version.outputs.VERSION }}

      - name: Upload Sentry source maps
        if: ${{ secrets.SENTRY_AUTH_TOKEN != '' }}
        run: |
          npx @sentry/cli releases new territory-run@${{ steps.version.outputs.VERSION }}
          npx @sentry/cli releases files territory-run@${{ steps.version.outputs.VERSION }} \
            upload-sourcemaps ./dist --rewrite
          npx @sentry/cli releases finalize territory-run@${{ steps.version.outputs.VERSION }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: territory-run

      - name: Deploy Hosting to Production
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.PROD_FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.PROD_FIREBASE_PROJECT_ID }}
          channelId: live

      - name: Install Functions dependencies
        run: cd functions && npm ci

      - name: Build Functions
        run: cd functions && npm run build

      - name: Deploy Functions to Production
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.PROD_FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.PROD_FIREBASE_PROJECT_ID }}
          entryPoint: './functions'

      - name: Deploy Firestore & Database Rules to Production
        run: |
          npm install -g firebase-tools
          firebase deploy --only firestore:rules,database --project ${{ secrets.PROD_FIREBASE_PROJECT_ID }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.PROD_FIREBASE_SERVICE_ACCOUNT }}
